services:
  a:
    container_name: task-a
    image: "node:21-alpine"
    working_dir: /usr/src/examples/object-oriented-tasks
    environment:
      CHUNK_NAME: a
      PORT: 3000
    volumes:
    - ../..:/usr/src
    command: ["npm", "start"]
    networks:
      - fulgence_network
  b:
    container_name: task-b
    image: "node:21-alpine"
    working_dir: /usr/src/examples/object-oriented-tasks
    environment:
      CHUNK_NAME: b
      PORT: 3000
    volumes:
    - ../..:/usr/src
    command: ["npm", "start"]
    networks:
      - fulgence_network
  c:
    container_name: task-c
    image: "node:21-alpine"
    working_dir: /usr/src/examples/object-oriented-tasks
    environment:
      CHUNK_NAME: c
      PORT: 3000
    volumes:
    - ../..:/usr/src
    command: ["npm", "start"]
    networks:
      - fulgence_network

networks:
  fulgence_network:
