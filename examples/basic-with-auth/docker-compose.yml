services:
  a:
    container_name: task-a
    image: "node:21-alpine"
    working_dir: /usr/src/examples/basic-with-auth
    environment:
      CHUNK_NAME: a
      PORT: 3000
      SECRET: AZERTYUIOP
    volumes:
    - ../..:/usr/src
    - ../basic:/usr/src/examples/basic-with-auth
    - ./api:/usr/src/examples/basic-with-auth/api
    - ./bin:/usr/src/examples/basic-with-auth/bin
    - ./package.json:/usr/src/examples/basic-with-auth/package.json
    - ./node_modules:/usr/src/examples/basic-with-auth/node_modules
    command: ["npm", "start"]
    networks:
      - fulgence_network
  b:
